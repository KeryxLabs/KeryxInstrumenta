name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./src/sttp-mcp/sttp-mcp.csproj

      - name: Build
        run: dotnet build ./src/sttp-mcp/sttp-mcp.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ./src/sttp-mcp.Tests/sttp-mcp.Tests.csproj --configuration Release --no-build

      - name: Docker build
        run: docker build -t sttp-mcp:ci ./src/sttp-mcp